<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Binary Search Game</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#1a56db', fg: '#ffffff' },
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['Menlo', 'monospace'],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; }
    input[type=range] { accent-color: #1a56db; cursor: pointer; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { opacity: 1; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback, useEffect, useRef } = React;

    function calcGuess(lo, hi) {
      return Math.round((lo + hi) / 2);
    }
    function maxGuesses(range) {
      return Math.ceil(Math.log2(range + 1));
    }

    function HintBadge({ hint }) {
      if (hint === "higher")
        return <span className="inline-flex items-center gap-1 bg-emerald-100 text-emerald-700 text-xs font-semibold px-2.5 py-1 rounded-full">Higher →</span>;
      if (hint === "lower")
        return <span className="inline-flex items-center gap-1 bg-red-100 text-red-700 text-xs font-semibold px-2.5 py-1 rounded-full">← Lower</span>;
      return <span className="inline-flex items-center gap-1 bg-emerald-100 text-emerald-700 text-xs font-semibold px-2.5 py-1 rounded-full">Correct!</span>;
    }

    function Metric({ label, value, blue }) {
      return (
        <div className="bg-gray-100 rounded-lg px-3 py-2.5 text-center border border-gray-200">
          <div className="text-xs text-gray-500 mb-1">{label}</div>
          <div className={`text-xl font-bold tabular-nums ${blue ? 'text-blue-700' : 'text-gray-900'}`}>{value}</div>
        </div>
      );
    }

    function RuleRow({ badge, badgeClass, children }) {
      return (
        <div className="flex items-center gap-3 text-sm">
          <span className={`inline-block shrink-0 text-xs font-semibold px-2.5 py-1 rounded-full ${badgeClass}`}>{badge}</span>
          <span className="text-gray-500">{children}</span>
        </div>
      );
    }

    function App() {
      const [rangeMin, setRangeMin] = useState(1);
      const [rangeMax, setRangeMax] = useState(99);
      const [minInput, setMinInput] = useState("1");
      const [maxInput, setMaxInput] = useState("99");

      const [lo, setLo] = useState(1);
      const [hi, setHi] = useState(99);
      const [count, setCount] = useState(0);
      const [done, setDone] = useState(false);
      const [history, setHistory] = useState([]);
      const [secretNum, setSecretNum] = useState(73);
      const [showFormula, setShowFormula] = useState(true);
      const [lastHint, setLastHint] = useState(null);
      const [animKey, setAnimKey] = useState(0);
      const histRef = useRef(null);

      const currentGuess = calcGuess(lo, hi);
      const rangeSize = hi - lo + 1;
      const maxNeeded = maxGuesses(rangeMax - rangeMin);

      const nextIfHigher = lo <= hi ? calcGuess(currentGuess + 1, hi) : currentGuess;
      const nextIfLower  = lo <= hi ? calcGuess(lo, currentGuess - 1) : currentGuess;

      const resetWithRange = useCallback((min, max, secret) => {
        setLo(min); setHi(max); setCount(0); setDone(false);
        setHistory([]); setLastHint(null);
        setAnimKey(k => k + 1);
        if (secret !== undefined) setSecretNum(secret);
      }, []);

      const resetDemo = useCallback(() => {
        resetWithRange(rangeMin, rangeMax);
      }, [rangeMin, rangeMax, resetWithRange]);

      const applyRange = () => {
        const min = parseInt(minInput, 10);
        const max = parseInt(maxInput, 10);
        if (isNaN(min) || isNaN(max) || min >= max || min < 0 || max > 99999) return;
        setRangeMin(min); setRangeMax(max);
        const clamped = Math.min(max - 1, Math.max(min + 1, secretNum));
        resetWithRange(min, max, clamped);
      };

      const handleSecretChange = (val) => {
        setSecretNum(val);
        resetWithRange(rangeMin, rangeMax, val);
      };

      useEffect(() => {
        if (histRef.current) histRef.current.scrollTop = histRef.current.scrollHeight;
      }, [history]);

      const doStep = (hint) => {
        if (done) return;
        const g = currentGuess;
        const newCount = count + 1;
        let next = null, newLo = lo, newHi = hi;
        if (hint === "higher") { newLo = g + 1; next = calcGuess(newLo, hi); }
        else if (hint === "lower") { newHi = g - 1; next = calcGuess(lo, newHi); }
        setHistory(prev => [...prev, { guess: g, hint, nextGuess: next, guessNumber: newCount, lo, hi }]);
        setCount(newCount); setLastHint(hint); setAnimKey(k => k + 1);
        if (hint === "correct") { setDone(true); }
        else if (hint === "higher") { setLo(newLo); }
        else { setHi(newHi); }
      };

      const span = rangeMax - rangeMin || 1;
      const fillLeft    = ((lo - rangeMin) / span) * 100;
      const fillWidth   = ((hi - lo) / span) * 100;
      const guessPos    = ((currentGuess - rangeMin) / span) * 100;
      const nextHiPos   = ((nextIfHigher - rangeMin) / span) * 100;
      const nextLoPos   = ((nextIfLower  - rangeMin) / span) * 100;

      const minInvalid = (() => {
        const mn = parseInt(minInput, 10), mx = parseInt(maxInput, 10);
        return isNaN(mn) || isNaN(mx) || mn >= mx || mn < 0 || mx > 99999;
      })();

      return (
        <div className="min-h-screen bg-gray-50 flex flex-col">

          {/* Header */}
          <header className="border-b border-gray-200 bg-white/80 backdrop-blur-sm sticky top-0 z-10">
            <div className="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
              <div>
                <h1 className="text-lg font-semibold text-gray-900 tracking-tight">Binary Search</h1>
                <p className="text-xs text-gray-500">Interactive Learning Demo</p>
              </div>
              <div className="flex items-center gap-2">
                <button
                  onClick={resetDemo}
                  className="text-xs font-medium bg-red-50 text-red-600 border border-red-200 hover:bg-red-100 rounded-md px-3 py-1.5 transition-colors"
                >Reset</button>
                <button
                  onClick={() => setShowFormula(v => !v)}
                  className="text-xs text-gray-500 hover:text-gray-900 border border-gray-200 rounded-md px-3 py-1.5 bg-white hover:bg-gray-50 transition-colors"
                >{showFormula ? "Hide" : "Show"} Formula</button>
              </div>
            </div>
          </header>

          <main className="flex-1 max-w-2xl mx-auto w-full px-4 py-6 space-y-4">

            {/* Formula banner */}
            {showFormula && (
              <div className="bg-blue-50 border border-blue-200 rounded-xl p-4">
                <div className="text-xs font-medium text-blue-700 mb-1 uppercase tracking-wider">The One Formula</div>
                <div className="text-2xl font-bold text-gray-900 font-mono mb-2">next guess = (low + high) / 2</div>
                <p className="text-xs text-gray-500 leading-relaxed">
                  <span className="text-gray-800 font-medium">low</span> = smallest number still possible &nbsp;&bull;&nbsp;
                  <span className="text-gray-800 font-medium">high</span> = largest number still possible.
                  After each hint, update one boundary and recalculate.
                </p>
              </div>
            )}

            {/* Main card */}
            <div className="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
              <div className="px-5 py-4 border-b border-gray-100 space-y-3">
                {/* Range inputs */}
                <div className="flex items-center gap-2 flex-wrap">
                  <span className="text-xs text-gray-500 whitespace-nowrap">Range:</span>
                  <input
                    type="number" value={minInput} min={0} max={99998}
                    onChange={e => setMinInput(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && applyRange()}
                    className="w-20 text-center text-sm font-medium bg-gray-100 border border-gray-200 rounded-md px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-400 tabular-nums"
                  />
                  <span className="text-xs text-gray-500">to</span>
                  <input
                    type="number" value={maxInput} min={1} max={99999}
                    onChange={e => setMaxInput(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && applyRange()}
                    className="w-24 text-center text-sm font-medium bg-gray-100 border border-gray-200 rounded-md px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-400 tabular-nums"
                  />
                  <button
                    onClick={applyRange} disabled={minInvalid}
                    className="text-xs font-semibold bg-blue-700 text-white rounded-md px-3 py-1.5 hover:bg-blue-800 transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
                  >Apply</button>
                  {minInvalid && <span className="text-xs text-red-500">min &lt; max, max ≤ 99999</span>}
                </div>
                {/* Secret slider */}
                <div className="flex items-center gap-3">
                  <label className="text-xs text-gray-500 whitespace-nowrap">Secret #:</label>
                  <input
                    type="range" min={rangeMin} max={rangeMax} value={secretNum} step={1}
                    onChange={e => handleSecretChange(Number(e.target.value))}
                    className="flex-1 h-1.5 rounded-full"
                  />
                  <span className="text-sm font-bold text-blue-700 min-w-[36px] text-right tabular-nums">{secretNum}</span>
                </div>
              </div>

              <div className="px-5 py-4">
                {/* Range bar */}
                <div className="mb-5">
                  <div className="flex justify-between text-xs mb-1.5">
                    <span className="font-medium text-gray-900">{rangeMin}</span>
                    <span className="text-gray-500">
                      possible range &nbsp;
                      <span className="text-gray-800 font-medium tabular-nums">{lo}–{hi}</span>
                    </span>
                    <span className="font-medium text-gray-900">{rangeMax}</span>
                  </div>
                  <div className="relative h-9 bg-gray-100 rounded-lg border border-gray-200" style={{overflow:'hidden'}}>
                    {/* Fill */}
                    <div
                      className="absolute top-0 h-full bg-blue-100 transition-all duration-300 ease-out rounded-lg"
                      style={{ left: `${fillLeft}%`, width: `${Math.max(fillWidth, 0)}%` }}
                    />
                    {/* Ghost lower */}
                    {!done && currentGuess > lo && (
                      <div className="absolute top-1 w-px bg-red-300" style={{ left: `calc(${nextLoPos}% - 0.5px)`, height: 'calc(100% - 8px)' }} />
                    )}
                    {/* Ghost higher */}
                    {!done && currentGuess < hi && (
                      <div className="absolute top-1 w-px bg-emerald-300" style={{ left: `calc(${nextHiPos}% - 0.5px)`, height: 'calc(100% - 8px)' }} />
                    )}
                    {/* Current guess line */}
                    <div className="absolute top-0 h-full w-0.5 bg-blue-700 transition-all duration-300 ease-out" style={{ left: `calc(${guessPos}% - 1px)` }} />
                    {/* Chip */}
                    <div
                      className="absolute top-1/2 z-10 transition-all duration-300 ease-out"
                      style={{ left: `${guessPos}%`, transform: 'translate(-50%, -50%)' }}
                    >
                      <div className="bg-blue-700 text-white text-[10px] font-bold rounded px-1.5 py-0.5 whitespace-nowrap shadow-sm">
                        {currentGuess}
                      </div>
                    </div>
                  </div>
                </div>

                {/* Current guess */}
                <div className="flex items-baseline gap-3 mb-4">
                  <span className="text-4xl font-bold text-gray-900 tabular-nums">{currentGuess}</span>
                  <div className="flex flex-col gap-0.5">
                    <span className="text-sm text-gray-500">is the current guess</span>
                    <span className="text-xs text-gray-500 font-mono bg-gray-100 px-2 py-0.5 rounded">
                      ({lo} + {hi}) / 2 = {currentGuess}
                    </span>
                  </div>
                  {lastHint && !done && <HintBadge hint={lastHint} />}
                  {done && <span className="inline-flex items-center bg-emerald-100 text-emerald-700 text-xs font-semibold px-2.5 py-1 rounded-full">Found!</span>}
                </div>

                {/* Metrics */}
                <div className="grid grid-cols-3 gap-3 mb-4">
                  <Metric label="Guess #"    value={done ? count : count + 1} blue={true} />
                  <Metric label="Range left" value={done ? 1 : rangeSize}     blue={true} />
                  <Metric label="Max needed" value={maxNeeded}                 blue={false} />
                </div>

                {/* Buttons */}
                {!done ? (
                  <div className="space-y-2">
                    <p className="text-xs text-gray-500 font-medium">
                      Is the secret number higher, lower, or equal to <span className="text-gray-900 font-bold">{currentGuess}</span>?
                    </p>
                    <div className="grid grid-cols-3 gap-2">
                      <button
                        onClick={() => doStep("lower")}
                        disabled={currentGuess <= lo}
                        className="flex flex-col items-center gap-0.5 bg-red-50 text-red-700 border border-red-200 rounded-xl px-3 py-3 font-medium hover:bg-red-100 transition-all disabled:opacity-40 disabled:cursor-not-allowed"
                      >
                        <span className="text-lg leading-none">←</span>
                        <span className="text-sm font-semibold">Lower</span>
                        <span className="text-xs opacity-70">{currentGuess > lo ? `next: ${nextIfLower}` : "at min"}</span>
                      </button>
                      <button
                        onClick={() => doStep("correct")}
                        className="flex flex-col items-center gap-0.5 bg-blue-700 text-white rounded-xl px-3 py-3 font-semibold hover:bg-blue-800 transition-all shadow-sm"
                      >
                        <span className="text-lg leading-none">✓</span>
                        <span className="text-sm font-semibold">Correct!</span>
                        <span className="text-xs opacity-70">that's it</span>
                      </button>
                      <button
                        onClick={() => doStep("higher")}
                        disabled={currentGuess >= hi}
                        className="flex flex-col items-center gap-0.5 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-xl px-3 py-3 font-medium hover:bg-emerald-100 transition-all disabled:opacity-40 disabled:cursor-not-allowed"
                      >
                        <span className="text-lg leading-none">→</span>
                        <span className="text-sm font-semibold">Higher</span>
                        <span className="text-xs opacity-70">{currentGuess < hi ? `next: ${nextIfHigher}` : "at max"}</span>
                      </button>
                    </div>
                  </div>
                ) : (
                  <div className="bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-4 text-center">
                    <div className="text-emerald-700 font-semibold text-base mb-0.5">
                      Found in {count} guess{count !== 1 ? "es" : ""}!
                    </div>
                    <div className="text-emerald-600 text-xs mb-3">
                      Binary search always wins in at most {maxNeeded} guesses for this range.
                    </div>
                    <button
                      onClick={resetDemo}
                      className="bg-emerald-600 text-white text-sm font-semibold px-5 py-2 rounded-lg hover:bg-emerald-700 transition-colors"
                    >Play again</button>
                  </div>
                )}
              </div>
            </div>

            {/* History */}
            {history.length > 0 && (
              <div className="bg-white border border-gray-200 rounded-xl shadow-sm">
                <div className="px-5 py-3 border-b border-gray-100 flex items-center justify-between">
                  <span className="text-sm font-medium text-gray-900">Guess History</span>
                  <span className="text-xs text-gray-500">{history.length} guess{history.length !== 1 ? "es" : ""}</span>
                </div>
                <div ref={histRef} className="px-5 py-3 max-h-52 overflow-y-auto space-y-2">
                  {history.map((record, i) => (
                    <div key={i} className="flex items-center gap-3 text-sm">
                      <span className="text-xs text-gray-400 w-7 shrink-0">#{record.guessNumber}</span>
                      <span className="font-bold text-gray-900 text-base w-10 shrink-0 tabular-nums">{record.guess}</span>
                      <HintBadge hint={record.hint} />
                      {record.nextGuess !== null && record.hint !== "correct" && (
                        <span className="text-xs text-gray-400">
                          → <span className="font-medium text-gray-700">{record.nextGuess}</span>
                        </span>
                      )}
                      <span className="text-xs text-gray-400 ml-auto font-mono">[{record.lo}–{record.hi}]</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Rules */}
            <div className="bg-white border border-gray-200 rounded-xl shadow-sm px-5 py-4">
              <div className="text-sm font-medium text-gray-900 mb-3">Rules after each answer</div>
              <div className="space-y-2.5">
                <RuleRow badge="Higher →" badgeClass="bg-emerald-100 text-emerald-700">
                  set <code className="bg-gray-100 px-1.5 py-0.5 rounded text-xs font-mono text-gray-800">low = guess + 1</code>, then recalculate
                </RuleRow>
                <RuleRow badge="← Lower" badgeClass="bg-red-100 text-red-700">
                  set <code className="bg-gray-100 px-1.5 py-0.5 rounded text-xs font-mono text-gray-800">high = guess - 1</code>, then recalculate
                </RuleRow>
                <RuleRow badge="Correct" badgeClass="bg-blue-100 text-blue-700">
                  You win. Max <strong className="font-semibold text-gray-900">{maxNeeded} guesses</strong> for this range, guaranteed.
                </RuleRow>
              </div>
            </div>

            {/* Why it works */}
            <div className="bg-white border border-gray-200 rounded-xl shadow-sm px-5 py-4">
              <div className="text-sm font-medium text-gray-900 mb-1">Why does this work?</div>
              <p className="text-xs text-gray-500 leading-relaxed">
                Every guess cuts the remaining range in half. For a range of <span className="text-gray-800 font-medium">{rangeMax - rangeMin + 1}</span> numbers,
                binary search always finds the answer in at most <span className="text-gray-800 font-semibold">{maxNeeded}</span> guesses — no matter what.
              </p>
              <div className="mt-3 flex gap-1.5 overflow-x-auto pb-1 items-end">
                {Array.from({ length: maxNeeded + 1 }, (_, i) => {
                  const remaining = Math.ceil((rangeMax - rangeMin + 1) / Math.pow(2, i));
                  return (
                    <div key={i} className="flex flex-col items-center shrink-0">
                      <div
                        className="w-7 bg-blue-100 rounded-sm border border-blue-200"
                        style={{ height: `${Math.max(3, (remaining / (rangeMax - rangeMin + 1)) * 52)}px` }}
                      />
                      <div className="text-[10px] text-gray-400 mt-1 tabular-nums">{remaining}</div>
                      <div className="text-[9px] text-gray-300">G{i + 1}</div>
                    </div>
                  );
                })}
              </div>
            </div>

          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
